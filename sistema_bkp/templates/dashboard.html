<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Help Desk</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: #ff4d4d;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            padding: 30px;
        }

        h2 {
            text-align: center;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin: 10px 0;
        }

        .btn-clientes {
            margin-top: 30px;
            display: block;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
            padding: 12px;
            background: #667eea;
            color: white;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>🛠️ Help Desk</h1>
    <div>
        <span id="nomeUsuario">Carregando...</span>
        <button class="btn" onclick="logout()">Sair</button>
    </div>
</header>

<div class="container">

    <h2 id="boasVindas">Bem-vindo!</h2>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>👥 Clientes</h3>
            <p id="totalClientes">0</p>
        </div>

        <div class="card">
            <h3>📊 Status</h3>
            <p>Sistema Online</p>
        </div>

        <div class="card">
            <h3>⚡ Performance</h3>
            <p>OK</p>
        </div>
    </div>

    <!-- BOTÃO -->
    <a href="/clientes/pagina" class="btn-clientes">
        👥 Gerenciar Clientes
    </a>

    <!-- TABELA -->
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Empresa</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody id="tabelaClientes"></tbody>
    </table>

</div>

<script>
async function carregarDashboard() {
    const token = localStorage.getItem('access_token');

    if (!token) {
        window.location.href = "/";
        return;
    }

    try {
        // 🔹 Usuário
        const resUser = await fetch('/api/auth/me', {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        const user = await resUser.json();

        document.getElementById('nomeUsuario').innerText = user.nome;
        document.getElementById('boasVindas').innerText = `Bem-vindo, ${user.nome}`;

        // 🔹 Clientes
        const resClientes = await fetch('/api/clientes/', {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        const clientes = await resClientes.json();

        document.getElementById('totalClientes').innerText = clientes.length;

        const tabela = document.getElementById('tabelaClientes');
        tabela.innerHTML = "";

        clientes.forEach(c => {
            const linha = `
                <tr>
                    <td>${c.nome}</td>
                    <td>${c.empresa}</td>
                    <td>${c.email}</td>
                </tr>
            `;
            tabela.innerHTML += linha;
        });

    } catch (err) {
        console.error("Erro:", err);
    }
}

function logout() {
    localStorage.removeItem('token');
    window.location.href = "/";
}

carregarDashboard();
</script>

</body>
</html>
